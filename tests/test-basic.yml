name: Test basic usage - run a simple command
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run simple echo command via runseal
        id: action
        uses: .
        with:
          run: echo hello-from-runseal
          network: blocked
          verify-attestations: "false"
      - name: Assert action completed successfully
        run: |
          echo "PASS: runseal action completed without error"
